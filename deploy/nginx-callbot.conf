# /etc/nginx/sites-available/callbot  (symlink into sites-enabled)
# Serves the built React app and reverse-proxies the API + websocket to Node.
#
#   cd client && npm run build      # outputs to client/dist
#   sudo cp -r client/dist /var/www/callbot
#
# For HTTPS, run certbot after this is in place (strongly recommended — the
# login token travels in the Authorization header).

server {
    listen 80;
    server_name callbot.example.com;   # <-- your domain or server IP

    root /var/www/callbot;
    index index.html;

    # Vite build assets are content-hashed (index-ABC123.js): a new build makes a
    # new filename, so they're safe to cache forever.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Never cache the HTML entry point — this is what makes a fresh deploy show up
    # immediately instead of after a manual refresh (it always points at the
    # latest asset filenames).
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
        expires off;
    }

    # Static SPA — fall back to index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # REST API
    location /api/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 30m;        # allow audio / contact-list uploads
    }

    # WebSocket for the live monitor
    location /ws/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 3600s;
    }
}
